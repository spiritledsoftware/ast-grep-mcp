name: Config or integration help
description: Ask for help with ast-grep MCP config, tools, or integrations.
title: "help: "
labels: ["question", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when the server runs, but you need help with MCP client
        configuration, tool inputs, ast-grep rules, or an integration. Please
        redact tokens, keys, and private URLs.

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to accomplish?
      description: Describe the setup or workflow you want ast-grep MCP to support.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config or tool input
      description: Paste the smallest MCP config, tool call, or ast-grep rule that shows the issue.
      render: json

  - type: textarea
    id: output
    attributes:
      label: Command output or agent behavior
      description: Show what ast-grep MCP or your agent does with this config.
      render: shell

  - type: dropdown
    id: integration
    attributes:
      label: Integration
      multiple: true
      options:
        - Claude Desktop
        - Claude Code
        - Codex
        - OpenCode
        - Direct stdio MCP client
        - Local development
        - Not sure

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Node:
        - Package manager:
        - MCP client/integration:
        - ast-grep MCP version/commit:
        - ast-grep binary source:

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I redacted secrets and private service details.
          required: true
