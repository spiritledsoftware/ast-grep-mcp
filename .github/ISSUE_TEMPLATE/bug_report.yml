name: Bug report
description: Report something broken or behaving unexpectedly.
title: "bug: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction steps help us fix
        issues faster.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
      placeholder: ast-grep MCP did X, but I expected Y.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include commands, MCP config snippets, ast-grep rules, patterns, or a minimal repo.
      placeholder: |
        1. Configure ast-grep MCP with this server config...
        2. Call `ast_grep_search` or `ast_grep_scan` with...
        3. See the error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste terminal output, MCP errors, or stack traces. Redact secrets.
      render: shell

  - type: input
    id: version
    attributes:
      label: ast-grep MCP version or commit
      description: Run `ast-grep-mcp --version` if available, or paste the package version or commit SHA.
      placeholder: v0.0.1 or abc1234

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - MCP server startup
        - Binary resolution
        - ast_grep_search
        - ast_grep_scan
        - ast_grep_test
        - Rewrite safety
        - Path validation
        - Result formatting
        - Documentation
        - Not sure

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Tell us about your OS, Node, package manager, MCP client, and ast-grep setup.
      value: |
        - OS:
        - Node:
        - Package manager:
        - MCP client/integration:
        - ast-grep binary source:
        - Workspace path shape:

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I removed or redacted secrets from logs and config.
          required: true
